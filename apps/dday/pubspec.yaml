name: dday
description: "D-Day 카운터 — App Factory 첫 제품."
publish_to: 'none'
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 공용 패키지 (워크스페이스에서 로컬 resolve)
  design_system: ^0.0.1
  core: ^0.0.1
  ads: ^0.0.1
  backend: ^0.0.1

  firebase_core: ^4.11.0

  flutter_riverpod: ^2.5.1
  home_widget: ^0.7.0
  intl: ^0.20.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences: ^2.3.0 # 위젯 테스트에서 직접 사용
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
